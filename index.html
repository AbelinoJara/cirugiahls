<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CirugiaHLS</title>
    <style>
      :root {
        --bg: #f5f5f4;
        --panel: rgba(255, 255, 255, 0.96);
        --panel-soft: #fafaf9;
        --line: #e7e5e4;
        --text: #1c1917;
        --muted: #78716c;
        --strong: #0c0a09;
        --shadow: 0 20px 60px rgba(28, 25, 23, 0.08);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; font-family: "Segoe UI", Arial, sans-serif; color: var(--text); background: radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 32%), linear-gradient(180deg, #fafaf9 0%, #f5f5f4 100%); }
      button, input, select, textarea { font: inherit; }
      a { color: inherit; }
      .hidden { display: none !important; }
      .app-shell { min-height: 100vh; }
      .container { width: min(1320px, calc(100vw - 32px)); margin: 0 auto; }
      .header { position: sticky; top: 0; z-index: 20; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.86); backdrop-filter: blur(16px); }
      .header-inner { padding: 24px 0; display: grid; gap: 24px; }
      .header-top { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
      .eyebrow { font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); }
      h1, h2, h3, h4, p { margin: 0; }
      h1 { font-size: clamp(30px, 4vw, 42px); line-height: 1.05; }
      h2 { font-size: 24px; line-height: 1.15; }
      h3 { font-size: 18px; line-height: 1.2; }
      .lead { margin-top: 12px; max-width: 760px; color: #57534e; line-height: 1.65; }
      .pill-row, .stats-grid, .grid, .cards { display: grid; gap: 16px; }
      .stats-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .card, .panel { background: var(--panel); border: 1px solid var(--line); box-shadow: var(--shadow); border-radius: var(--radius-xl); }
      .card { padding: 20px; }
      .panel { padding: 24px; }
      .stat-label { font-size: 14px; color: var(--muted); }
      .stat-value { margin-top: 8px; font-size: 34px; font-weight: 700; letter-spacing: -0.03em; }
      .stat-help { margin-top: 8px; color: var(--muted); font-size: 14px; }
      .tabs { display: flex; gap: 12px; flex-wrap: wrap; }
      .btn, .input, .select, .textarea, .tag, .chip { border-radius: 999px; border: 1px solid transparent; }
      .btn { cursor: pointer; transition: 0.2s ease; padding: 12px 18px; font-weight: 600; }
      .btn:hover { transform: translateY(-1px); }
      .btn-dark { background: #0c0a09; color: white; }
      .btn-dark:hover { background: #292524; }
      .btn-light { background: white; border-color: #d6d3d1; color: #44403c; }
      .btn-light:hover { background: #fafaf9; }
      .btn-danger { background: #e11d48; color: white; }
      .btn-danger:hover { background: #be123c; }
      .session-badge { padding: 10px 16px; background: #fafaf9; border-radius: 999px; border: 1px solid var(--line); color: #57534e; }
      .main { padding: 32px 0 48px; }
      .sector-section { margin-bottom: 28px; }
      .section-top { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
      .sector-beds { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; }
      .bed-card { width: 100%; text-align: left; border-radius: 24px; border: 1px solid #d6d3d1; background: #fafaf9; padding: 18px; cursor: pointer; transition: 0.2s ease; }
      .bed-card:hover { transform: translateY(-2px); border-color: #a8a29e; background: white; }
      .bed-card.occupied { background: #0c0a09; border-color: #0c0a09; color: white; }
      .bed-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      .small { font-size: 14px; color: var(--muted); }
      .occupied .small { color: #d6d3d1; }
      .status { padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }
      .status.free { background: #dcfce7; color: #15803d; }
      .status.occupied { background: rgba(255,255,255,0.12); color: white; }
      .bed-body { margin-top: 28px; }
      .empty-box { border-radius: 20px; border: 1px dashed #d6d3d1; text-align: center; padding: 34px 16px; color: var(--muted); font-size: 14px; }
      .patient-name { font-size: 22px; font-weight: 700; line-height: 1.2; }
      .team-badge, .tag { display: inline-flex; align-items: center; padding: 7px 12px; border-radius: 999px; border: 1px solid transparent; font-size: 12px; font-weight: 700; }
      .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
      .history-list { display: grid; gap: 18px; }
      .history-top { display: flex; justify-content: space-between; gap: 18px; flex-wrap: wrap; }
      .history-actions { display: flex; gap: 10px; flex-wrap: wrap; }
      .meta-line { margin-top: 12px; color: #57534e; line-height: 1.6; font-size: 14px; }
      .filters-grid, .form-grid, .subgrid { display: grid; gap: 14px; }
      .filters-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .form-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .subgrid.two { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
      .field { display: grid; gap: 8px; }
      .field label { font-size: 14px; font-weight: 600; color: #44403c; }
      .input, .select { width: 100%; padding: 13px 16px; border-radius: 18px; border: 1px solid #d6d3d1; background: #fafaf9; color: var(--text); }
      .textarea { width: 100%; min-height: 220px; padding: 16px; border-radius: 22px; border: 1px solid #d6d3d1; background: #fafaf9; color: var(--text); resize: vertical; }
      .input:focus, .select:focus, .textarea:focus { outline: none; border-color: #0c0a09; background: white; }
      .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
      .team-option { border-radius: 18px; border: 1px solid #e7e5e4; background: #fafaf9; padding: 14px 16px; text-align: left; cursor: pointer; font-weight: 600; }
      .team-option.selected { box-shadow: inset 0 0 0 2px rgba(12,10,9,0.08); }
      .stack { display: grid; gap: 12px; }
      .row { display: flex; gap: 12px; align-items: center; }
      .row.wrap { flex-wrap: wrap; }
      .row.end { justify-content: flex-end; }
      .item-card { border: 1px solid var(--line); background: var(--panel-soft); border-radius: 24px; padding: 14px; }
      .labs-wrap { overflow: auto; border: 1px solid var(--line); border-radius: 24px; }
      table { width: 100%; border-collapse: collapse; min-width: 680px; }
      th, td { padding: 12px 14px; border-top: 1px solid var(--line); vertical-align: top; text-align: left; }
      thead th { border-top: none; background: #fafaf9; font-size: 13px; color: #57534e; }
      .gallery { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .gallery-item { overflow: hidden; border-radius: 22px; border: 1px solid var(--line); background: #fafaf9; }
      .gallery-item img { display: block; width: 100%; height: 170px; object-fit: cover; }
      .dropzone { border: 1px dashed #d6d3d1; background: #fafaf9; border-radius: 28px; padding: 24px; }
      .modal-backdrop { position: fixed; inset: 0; z-index: 40; background: rgba(12,10,9,0.42); backdrop-filter: blur(8px); display: flex; justify-content: center; padding: 18px; }
      .drawer { width: min(1180px, 100%); height: calc(100vh - 36px); display: flex; flex-direction: column; background: var(--bg); border-radius: 28px; overflow: hidden; }
      .drawer-head, .drawer-foot { padding: 20px 24px; background: white; border-bottom: 1px solid var(--line); }
      .drawer-foot { border-top: 1px solid var(--line); border-bottom: none; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
      .drawer-body { flex: 1; overflow: auto; padding: 24px; display: grid; gap: 20px; }
      .dialog { width: min(560px, 100%); margin: auto; background: white; border-radius: 28px; border: 1px solid var(--line); box-shadow: var(--shadow); padding: 24px; }
      .chart-box { border-radius: 24px; border: 1px solid var(--line); background: #fafaf9; padding: 12px; }
      .svg-chart { width: 100%; height: 260px; display: block; }
      .chart-empty { height: 260px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }
      .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
      .login-grid { width: min(1160px, 100%); display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 24px; }
      .login-card { background: var(--panel); border: 1px solid var(--line); border-radius: 32px; box-shadow: var(--shadow); padding: 32px; }
      .metrics { margin-top: 28px; display: grid; gap: 14px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .metric { border: 1px solid var(--line); background: #fafaf9; border-radius: 24px; padding: 18px; }
      .metric-value { margin-top: 8px; font-size: 30px; font-weight: 700; }
      .error { padding: 12px 14px; border-radius: 18px; background: #fff1f2; border: 1px solid #fecdd3; color: #be123c; font-size: 14px; }
      .muted-box { margin-top: 20px; padding: 14px; border-radius: 22px; border: 1px solid var(--line); background: #fafaf9; color: #57534e; font-size: 14px; line-height: 1.6; }

      @media (max-width: 900px) {
        .login-grid { grid-template-columns: 1fr; }
        .metrics { grid-template-columns: 1fr; }
      }

      @media (max-width: 720px) {
        .container { width: min(100vw - 20px, 1320px); }
        .drawer, .dialog { width: 100%; }
        .drawer-head, .drawer-foot, .drawer-body, .panel, .card { padding-left: 16px; padding-right: 16px; }
        .drawer-head, .drawer-foot { padding-top: 16px; padding-bottom: 16px; }
        .history-top, .header-top, .section-top, .drawer-foot { flex-direction: column; align-items: stretch; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/main.js"></script>
  </body>
  </html>
